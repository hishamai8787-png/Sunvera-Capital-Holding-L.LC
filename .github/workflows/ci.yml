name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily security audit at 1:00 AM UTC (4:00 AM Asia/Riyadh)
    - cron: '0 1 * * *'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
        continue-on-error: true
      - run: npm run test
        env:
          NODE_ENV: test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-test-secret-not-for-production
          NEXT_PUBLIC_SUPABASE_URL: ""
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ""
      - run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-test-secret-not-for-production
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  security-audit:
    runs-on: ubuntu-latest
    # Run on schedule and on PRs, not every push
    if: github.event_name == 'schedule' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      - name: Check for outdated packages
        run: npm outdated
        continue-on-error: true
      - name: Security audit summary
        run: |
          echo "## Security Audit Summary"
          echo ""
          npm audit --audit-level=moderate 2>&1 || true
          echo ""
          echo "## Outdated Packages"
          echo ""
          npm outdated 2>&1 || true
